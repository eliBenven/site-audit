name: 'Site Audit'
description: 'Run comprehensive site audit with design scoring on PRs'
inputs:
  url:
    description: 'URL to audit'
    required: true
  fail-on:
    description: 'Fail if issues at this severity or above (error, warning, info)'
    required: false
    default: ''
  design-threshold:
    description: 'Minimum design score (0-100). Fails if below.'
    required: false
    default: '0'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install site-audit
      shell: bash
      run: npm install -g @benven/site-audit
    - name: Install Playwright
      shell: bash
      run: npx playwright install chromium --with-deps
    - name: Run audit
      shell: bash
      id: audit
      run: |
        # Run SEO audit
        site-audit audit "${{ inputs.url }}" --mode html --skip-lighthouse --ci --json > /tmp/audit.json 2>/dev/null || true

        # Run design evaluation
        site-audit design "${{ inputs.url }}" --max-pages 10 --json > /tmp/design.json 2>/dev/null || true

        # Extract scores
        SEO_ERRORS=$(node -e "const r=require('/tmp/audit.json'); console.log(r.seo?.summary?.error ?? 0)")
        SEO_WARNINGS=$(node -e "const r=require('/tmp/audit.json'); console.log(r.seo?.summary?.warning ?? 0)")
        PAGES=$(node -e "const r=require('/tmp/audit.json'); console.log(r.crawl?.totalPages ?? 0)")
        FIXES=$(node -e "const r=require('/tmp/audit.json'); console.log(r.rankedFixes?.length ?? 0)")
        DESIGN_SCORE=$(node -e "const r=require('/tmp/design.json'); console.log(r.overall ?? 0)")

        # Top 5 fixes
        TOP_FIXES=$(node -e "
          const r=require('/tmp/audit.json');
          const fixes = (r.rankedFixes || []).slice(0,5);
          for (const f of fixes) console.log('| ' + f.rank + ' | ' + f.title + ' | ' + f.impact + ' | ' + f.effort + ' | ' + f.affectedUrls.length + ' |');
        ")

        # Design dimensions
        DESIGN_DIMS=$(node -e "
          const r=require('/tmp/design.json');
          for (const d of (r.dimensions || [])) {
            const bar = String.fromCodePoint(0x2588).repeat(Math.round(d.score/5)) + String.fromCodePoint(0x2591).repeat(20-Math.round(d.score/5));
            console.log('| ' + d.dimension + ' | ' + bar + ' | ' + d.score + '/100 |');
          }
        ")

        # Build comment
        cat > /tmp/comment.md << COMMENT_EOF
        ## Site Audit Results

        **URL**: ${{ inputs.url }}
        **Pages crawled**: ${PAGES} | **SEO Errors**: ${SEO_ERRORS} | **Warnings**: ${SEO_WARNINGS} | **Design Score**: ${DESIGN_SCORE}/100

        ### Top Fixes
        | # | Fix | Impact | Effort | Pages |
        |---|-----|--------|--------|-------|
        ${TOP_FIXES}

        ### Design Evaluation
        | Dimension | Score | Rating |
        |-----------|-------|--------|
        ${DESIGN_DIMS}

        <sub>Generated by [@benven/site-audit](https://github.com/eliBenven/site-audit)</sub>
        COMMENT_EOF

        echo "seo_errors=${SEO_ERRORS}" >> $GITHUB_OUTPUT
        echo "seo_warnings=${SEO_WARNINGS}" >> $GITHUB_OUTPUT
        echo "design_score=${DESIGN_SCORE}" >> $GITHUB_OUTPUT
        echo "pages=${PAGES}" >> $GITHUB_OUTPUT

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        if [ -f /tmp/comment.md ]; then
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
        fi
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Check thresholds
      shell: bash
      run: |
        DESIGN_SCORE="${{ steps.audit.outputs.design_score }}"
        THRESHOLD="${{ inputs.design-threshold }}"
        if [ "$THRESHOLD" -gt 0 ] && [ "$DESIGN_SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::Design score ${DESIGN_SCORE} is below threshold ${THRESHOLD}"
          exit 1
        fi
